# ZeroClaw Devfile — Web Terminal (No IDE)
#
# ZeroClaw is a Rust-based AI agent gateway/runtime.
# Repo: https://github.com/zeroclaw-labs/zeroclaw
#
# Single container running both ttyd (web terminal) and zeroclaw daemon.
# The .che/che-editor.yaml prevents Eclipse Che from injecting VS Code.
# The Dashboard opens the ttyd web terminal where users can run
# zeroclaw CLI commands and manage the daemon directly.
#
# The zeroclaw web UI is accessible via its own Route (deployByDefault).
# Do NOT apply the Service/Route manually beforehand — DWO creates
# them as cluster resources.

schemaVersion: 2.3.0
metadata:
  name: zeroclaw-terminal

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  # Service with a fixed name so the Route can reference it.
  # DWO applies this as a cluster resource (not a pod container).
  - name: zeroclaw-service
    kubernetes:
      deployByDefault: true
      inlined: |
        apiVersion: v1
        kind: Service
        metadata:
          name: zeroclaw-terminal
        spec:
          selector:
            controller.devfile.io/devworkspace_name: zeroclaw-terminal
          ports:
            - name: gateway
              port: 42617
              targetPort: 42617

  # Route for the zeroclaw web UI. Applied on OpenShift only.
  # DWO applies this as a cluster resource, independent of routingClass.
  - name: zeroclaw-route
    openshift:
      deployByDefault: true
      inlined: |
        apiVersion: route.openshift.io/v1
        kind: Route
        metadata:
          name: zeroclaw-terminal
        spec:
          to:
            kind: Service
            name: zeroclaw-terminal
          port:
            targetPort: gateway
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect

  # Single container: ttyd (foreground) + zeroclaw daemon (background).
  # The startup script patches config, starts the daemon, then runs ttyd.
  # Users interact via the browser terminal — run `zeroclaw onboard` to
  # configure, then `zeroclaw-restart` to apply changes to the daemon.
  - name: zeroclaw
    container:
      image: quay.io/okurinny/zeroclaw-full:v0.1.7
      mountSources: false
      memoryRequest: 256Mi
      memoryLimit: 1Gi
      command: ["/bin/bash", "-c"]
      args:
        - |
          mkdir -p /zeroclaw-data/.zeroclaw /zeroclaw-data/workspace
          if [ -f /zeroclaw-data/.zeroclaw/config.toml ]; then
            sed -i 's/^host = .*/host = "[::]"/' /zeroclaw-data/.zeroclaw/config.toml
            sed -i 's/^allow_public_bind = .*/allow_public_bind = true/' /zeroclaw-data/.zeroclaw/config.toml
          fi
          zeroclaw daemon &
          exec ttyd -W bash
      endpoints:
        - name: gateway
          targetPort: 42617
          exposure: internal
          protocol: http
        - name: terminal
          targetPort: 7681
          exposure: public
          protocol: https
          attributes:
            type: main
            cookiesAuthEnabled: true
            discoverable: false
            urlRewriteSupported: true
      volumeMounts:
        - name: zeroclaw-workspace
          path: /zeroclaw-data/workspace
        - name: zeroclaw-config
          path: /zeroclaw-data/.zeroclaw

  - name: zeroclaw-workspace
    volume:
      size: 1Gi

  - name: zeroclaw-config
    volume:
      size: 256Mi
