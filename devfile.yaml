# ZeroClaw Devfile — Web Terminal (No IDE)
#
# ZeroClaw is a Rust-based AI agent gateway/runtime.
# Repo: https://github.com/zeroclaw-labs/zeroclaw
#
# The zeroclaw daemon runs in its own container. The ttyd web terminal
# is injected via .che/che-editor.yaml as a container contribution
# (following the che-code editor pattern). After DWO merges the
# contribution, ttyd runs inside the same container as the daemon.
#
# The zeroclaw web UI is accessible via its own Route (deployByDefault).
# Do NOT apply the Service/Route manually beforehand — DWO creates
# them as cluster resources.

schemaVersion: 2.3.0
metadata:
  name: zeroclaw-terminal

attributes:
  controller.devfile.io/storage-type: per-workspace

components:
  # Service with a fixed name so the Route can reference it.
  # DWO applies this as a cluster resource (not a pod container).
  - name: zeroclaw-service
    kubernetes:
      deployByDefault: true
      inlined: |
        apiVersion: v1
        kind: Service
        metadata:
          name: zeroclaw-terminal
        spec:
          selector:
            controller.devfile.io/devworkspace_name: zeroclaw-terminal
          ports:
            - name: gateway
              port: 42617
              targetPort: 42617

  # Route for the zeroclaw web UI. Applied on OpenShift only.
  # DWO applies this as a cluster resource, independent of routingClass.
  - name: zeroclaw-route
    openshift:
      deployByDefault: true
      inlined: |
        apiVersion: route.openshift.io/v1
        kind: Route
        metadata:
          name: zeroclaw-terminal
        spec:
          to:
            kind: Service
            name: zeroclaw-terminal
          port:
            targetPort: gateway
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect

  # Zeroclaw daemon container.
  # The ttyd web terminal is injected via .che/che-editor.yaml as a
  # container contribution (following the che-code editor pattern).
  # Users interact via the browser terminal — run `zeroclaw onboard` to
  # configure, then use Dashboard restart to apply changes to the daemon.
  #
  # On first boot, the daemon runs briefly to generate its default
  # config, then is stopped so the startup script can patch gateway
  # and MCP settings before the final start.
  - name: zeroclaw
    container:
      image: quay.io/okurinny/zeroclaw-full:v0.1.7
      mountSources: false
      memoryRequest: 256Mi
      memoryLimit: 1Gi
      command: ["/bin/bash", "-c"]
      args:
        - |
          mkdir -p /zeroclaw-data/.zeroclaw /zeroclaw-data/workspace
          CFG=/zeroclaw-data/.zeroclaw/config.toml
          if [ ! -f "$CFG" ]; then
            zeroclaw daemon &
            PID=$!
            while [ ! -f "$CFG" ]; do sleep 0.2; done
            kill $PID 2>/dev/null; wait $PID 2>/dev/null
          fi
          sed -i 's/^host = .*/host = "[::]"/' "$CFG"
          sed -i 's/^allow_public_bind = .*/allow_public_bind = true/' "$CFG"
          if ! grep -q '\[mcp\]' "$CFG"; then
            printf '\n[mcp]\nenabled = true\n\n[[mcp.servers]]\nname = "che"\ntransport = "http"\nurl = "http://che-mcp-server:8080/mcp"\n' >> "$CFG"
          fi
          /ttyd-vol/ttyd -W bash &
          exec zeroclaw daemon
      endpoints:
        - name: gateway
          targetPort: 42617
          exposure: internal
          protocol: http
      volumeMounts:
        - name: zeroclaw-workspace
          path: /zeroclaw-data/workspace
        - name: zeroclaw-config
          path: /zeroclaw-data/.zeroclaw

  - name: zeroclaw-workspace
    volume:
      size: 1Gi

  - name: zeroclaw-config
    volume:
      size: 256Mi
